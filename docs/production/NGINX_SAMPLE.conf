server {
    listen 80;
    server_name YOUR_PUBLIC_HOSTNAME;

    # After Certbot is configured, redirect HTTP to HTTPS.
    # return 301 https://$host$request_uri;

    client_max_body_size 250M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTPS reminder:
# 1. Install Certbot or your preferred certificate automation.
# 2. Issue a certificate for YOUR_PUBLIC_HOSTNAME.
# 3. Confirm automatic renewal.
# 4. Confirm uploads still work after TLS is enabled.
